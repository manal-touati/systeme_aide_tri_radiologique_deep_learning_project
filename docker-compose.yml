version: '3.8'

services:
  # Application Streamlit
  streamlit:
    build: .
    container_name: radiological_app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
      - ./plots:/app/plots
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0

  # MLflow Tracking Server
  mlflow:
    build: .
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    environment:
      - PYTHONUNBUFFERED=1
    command: mlflow ui --backend-store-uri file:///app/mlruns --host 0.0.0.0 --port 5000

  # Service d'entraînement (optionnel, pour démarrage manuel)
  trainer:
    build: .
    container_name: radiological_trainer
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
      - ./plots:/app/plots
    environment:
      - PYTHONUNBUFFERED=1
    command: python quickstart.py
    profiles:
      - training  # À lancer avec : docker-compose --profile training up trainer

volumes:
  mlruns:
  models:
  data:
  plots:

networks:
  default:
    name: radiological_network
